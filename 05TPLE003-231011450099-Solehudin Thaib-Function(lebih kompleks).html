<!DOCTYPE html>
<html>
<head>
  <title>Contoh Function</title>
</head>
<body>
  <script>
    // Function menghitung diskon
    function hitungDiskon(harga, persen) {
      let potongan = harga * (persen / 100);
      return harga - potongan;
    }

    let hargaBarang = 100000;
    let diskon = 20;
    let hargaSetelahDiskon = hitungDiskon(hargaBarang, diskon);
    document.write("Harga awal: " + hargaBarang + "<br>");
    document.write("Diskon: " + diskon + "%<br>");
    document.write("Harga setelah diskon: " + hargaSetelahDiskon + "<br>");

    // Function konversi suhu
    function konversiSuhu(celcius) {
      let fahrenheit = (celcius * 9/5) + 32;
      return fahrenheit;
    }

    let suhuC = 30;
    document.write("Suhu " + suhuC + "°C = " + konversiSuhu(suhuC) + "°F");
  </script>
</body>
</html>
